{% if members %}
<ul style="list-style:none;margin:4px 0 0 0;padding:0;border:1px solid #ccc;border-radius:4px;max-height:180px;overflow-y:auto;background:#fff;position:relative;z-index:100">
    {% for m in members %}
    <li style="border-bottom:1px solid #f0f0f0">
        <button type="button"
                style="width:100%;text-align:left;background:#fff;border:none;padding:8px 12px;cursor:pointer;color:#000;font-size:1rem"
                onmouseover="this.style.background='#f5f5f5'"
                onmouseout="this.style.background='#fff'"
                onclick="selectMember('{{ slot }}', '{{ m.id }}', '{{ m.first_name }} {{ m.last_name }}')">
            {{ m.first_name }} {{ m.last_name }}
        </button>
    </li>
    {% endfor %}
</ul>
{% elif query %}
<p style="color:#9ca3af;margin:4px 0">No members found.</p>
{% endif %}
